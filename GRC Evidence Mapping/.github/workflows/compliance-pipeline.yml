name: Continuous Compliance Pipeline
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8:00 AM

jobs:
  gather-and-document:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
        
      - name: Run Checkov against Frameworks
        continue-on-error: true
        run: |
          pip install checkov
          mkdir -p evidence/iso27001 evidence/soc2 evidence/nist
          checkov -d infrastructure/ --framework iso27001 --output json > evidence/iso27001/daily-scan-results.json
          checkov -d infrastructure/ --framework soc2 --output json > evidence/soc2/daily-scan-results.json
          checkov -d infrastructure/ --framework nist --output json > evidence/nist/daily-scan-results.json
          
      - name: Convert JSON Evidence to Markdown Tables
        run: python scripts/json-to-markdown.py
          
      - name: Commit Fresh Evidence and Logs to Vault
        run: |
          git config --global user.name "EaC Bot"
          git config --global user.email "compliance-bot@company.local"
          git add evidence/ governance-vault/
          git commit -m "Automated Evidence & Vault Sync: $(date +'%Y-%m-%d')" || echo "No compliance changes detected."
          git push
