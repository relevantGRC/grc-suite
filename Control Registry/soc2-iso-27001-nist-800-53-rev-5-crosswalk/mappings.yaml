metadata:
  version: "1.0"
  pivot_framework: "SOC 2 TSC Common Criteria"
  bridge_framework: "NIST 800-53 Rev 5"
  third_framework: "ISO 27001:2022 Annex A"
  row_count: 9

mappings:
  - soc2_cc: CC6.1
    nist_800_53:
      - AC-3
    iso_27001_2022:
      - A.5.15
      - A.8.3
    confidence: Strong
    rationale: |
      AC-3 enforces approved authorizations for logical access at the system
      and application layer. CC6.1 frames logical-access security architecture
      and enforcement mechanisms. ISO A.5.15 (access control) and A.8.3
      (information access restriction) address the same enforcement intent from
      policy and technical restriction angles.

  - soc2_cc: CC6.2
    nist_800_53:
      - AC-2
    iso_27001_2022:
      - A.5.16
      - A.5.18
    confidence: Strong
    rationale: |
      AC-2 governs the full account lifecycle — approve before create, modify,
      disable, remove, and periodic review. CC6.2 covers registration and
      authorization of new users before credentials are issued. ISO A.5.16
      (identity management) and A.5.18 (access rights) map to provisioning
      and rights assignment during onboarding.

  - soc2_cc: CC6.3
    nist_800_53:
      - AC-6
      - AC-2
    iso_27001_2022:
      - A.8.2
      - A.8.3
    confidence: Strong
    rationale: |
      AC-6 authorizes only the access necessary for assigned tasks (least
      privilege). AC-2 supports modification and removal when roles change.
      CC6.3 covers role-based access, modification, and removal including
      least privilege and segregation of duties. ISO A.8.2 (privileged access
      rights) and A.8.3 (information access restriction) align with privilege
      minimization and access boundaries.

  - soc2_cc: CC6.6
    nist_800_53:
      - IA-2
    iso_27001_2022:
      - A.8.5
      - A.5.16
    confidence: Strong
    rationale: |
      IA-2 requires unique identification and authentication of organizational
      users. CC6.6 addresses measures against threats from outside the
      boundary, including authentication strength. ISO A.8.5 (secure
      authentication) and A.5.16 (identity management) cover the authentication
      mechanism and the identity binding it depends on.

  - soc2_cc: CC6.6
    nist_800_53:
      - IA-5
    iso_27001_2022:
      - A.5.17
    confidence: Partial
    rationale: |
      IA-5 manages the authenticator lifecycle — issuance, strength, default
      changes, rotation, and revocation. CC6.6 blends authentication mechanism
      and credential management. ISO separates A.5.17 (authentication
      information / authenticator management) from A.8.5 (secure authentication
      mechanism). An ISO audit may require the authenticator-policy artifact
      separately even when SOC 2 and NIST evidence already covers the mechanism.

  - soc2_cc: CC7.2
    nist_800_53:
      - AU-2
    iso_27001_2022:
      - A.8.15
    confidence: Strong
    rationale: |
      AU-2 requires identifying event types the system can log, selecting the
      subset to log, and reviewing that selection for investigative adequacy.
      CC7.2 monitors system components for anomalies. ISO A.8.15 (logging)
      aligns with defining and maintaining what gets logged.

  - soc2_cc: CC7.3
    nist_800_53:
      - AU-6
    iso_27001_2022:
      - A.8.16
    confidence: Strong
    rationale: |
      AU-6 requires reviewing and analyzing audit records on a defined
      frequency, reporting findings, and adjusting depth when risk changes.
      CC7.3 evaluates security events for potential incidents. ISO A.8.16
      (monitoring activities) maps to the analytic loop over logged events.

  - soc2_cc: CC8.1
    nist_800_53:
      - CM-2
    iso_27001_2022:
      - A.8.9
    confidence: Partial
    rationale: |
      CM-2 develops and maintains a baseline configuration under configuration
      control, reviewed on defined frequency and on install or upgrade. CC8.1
      frames broad change management — authorize, design, test, approve, and
      implement changes. ISO A.8.9 (configuration management) is
      config-to-config alignment, but the hop to the CC8.1 change pivot is 
      loose. CM-2 keeps a foot in the change door via baseline maintained 
      under configuration control.

  - soc2_cc: CC8.1
    nist_800_53:
      - CM-6
    iso_27001_2022:
      - A.8.9
    confidence: Contextual
    rationale: |
      CM-6 establishes and implements restrictive configuration settings,
      documents deviations, and monitors changes to settings. CC8.1 expects
      change authorization and approval evidence. CM-6 is pure hardened-settings
      state — a STIG or SCAP scan demonstrates configuration posture but does
      not satisfy a change-approval ticket. ISO A.8.9 aligns on configuration
      management; A.8.32 (change management) is the closer ISO frame for the
      SOC 2 pivot.
